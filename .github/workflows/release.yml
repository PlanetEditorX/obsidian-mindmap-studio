name: Create Release

on:
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  changes:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.filter.outputs.should_release }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check release-related changes
        id: filter
        shell: bash
        run: |
          git fetch origin main --tags

          TESTED_SHA="${{ github.event.workflow_run.head_sha }}"
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$TESTED_SHA" != "$MAIN_SHA" ]; then
            echo "Tested commit is no longer the latest main commit; skipping obsolete release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.workflow_run.event }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED=$(git diff --name-only "$BASE"..HEAD)
          if printf '%s\n' "$CHANGED" | grep -Eq '^(main\.js|styles\.css|manifest\.json|package(-lock)?\.json|src/)'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: changes
    if: needs.changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          git fetch origin --tags
          CURRENT=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -n 1)
          LATEST=${LATEST_TAG#v}
          BASE=$(node -e '
            const versions = process.argv.slice(1).filter(Boolean);
            versions.sort((a, b) => {
              const left = a.split(".").map(Number);
              const right = b.split(".").map(Number);
              return (right[0] - left[0]) || (right[1] - left[1]) || (right[2] - left[2]);
            });
            console.log(versions[0]);
          ' "$CURRENT" "$LATEST")
          NEXT=$(node scripts/next-version.mjs "$BASE")
          while git rev-parse -q --verify "refs/tags/v$NEXT" >/dev/null; do
            NEXT=$(node scripts/next-version.mjs "$NEXT")
          done
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"

      - name: Sync version files
        run: node scripts/sync-version.mjs "${{ steps.version.outputs.next }}"

      - name: Run tests
        run: npm test

      - name: Check generated docs
        run: npm run docs:check

      - name: Build plugin
        run: npm run build

      - name: Verify build
        run: |
          test -s main.js
          test -s manifest.json
          test -s styles.css
          node --check main.js
          test "$(node -p "require('./package.json').version")" = "${{ steps.version.outputs.next }}"
          test "$(node -p "require('./manifest.json').version")" = "${{ steps.version.outputs.next }}"

      - name: Commit version update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json manifest.json versions.json main.js
          git commit -m "chore(release): v${{ steps.version.outputs.next }}"

      - name: Create release archives
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          INSTALL_NAME="mindmap-studio-${VERSION}-install.zip"
          SOURCE_NAME="obsidian-mindmap-studio-${VERSION}-source.zip"
          CHECKSUM_NAME="mindmap-studio-${VERSION}-checksums.txt"

          rm -rf release-package
          mkdir -p release-package/mindmap-studio
          cp main.js manifest.json styles.css release-package/mindmap-studio/

          (cd release-package && zip -r "../$INSTALL_NAME" mindmap-studio -x '*.DS_Store')

          git archive --format=zip \
            --prefix="obsidian-mindmap-studio-${VERSION}/" \
            --output="$SOURCE_NAME" HEAD

          sha256sum "$INSTALL_NAME" "$SOURCE_NAME" > "$CHECKSUM_NAME"

          unzip -l "$INSTALL_NAME"

          EXPECTED_FILES=$(printf '%s\n' \
            'mindmap-studio/main.js' \
            'mindmap-studio/manifest.json' \
            'mindmap-studio/styles.css' | sort)
          ACTUAL_FILES=$(unzip -Z1 "$INSTALL_NAME" | grep -v '/$' | sort)

          test "$ACTUAL_FILES" = "$EXPECTED_FILES"

      - name: Tag and push release
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          gh release create "v${VERSION}" \
            "mindmap-studio-${VERSION}-install.zip" \
            "obsidian-mindmap-studio-${VERSION}-source.zip" \
            "mindmap-studio-${VERSION}-checksums.txt" \
            --title "MindMap Studio v${VERSION}" \
            --generate-notes
